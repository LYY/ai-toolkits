name: Check Dead Links

on:
  workflow_dispatch:
  push:
    paths:
      - 'skills/**/*.md'
      - 'docs/**/*.md'
      - '*.md'
      - 'skills/**/references/*.md'
      - 'skills/address-pr-comments-review/**'
      - 'docs/address-pr-comments-review/**'
      - 'scripts/check-address-pr-comments-review-contract.sh'
      - 'tests/address-pr-comments-review-contract/**'
      - 'skills/financial-systems-testing/**'
      - 'docs/financial-systems-testing/**'
      - 'scripts/check-financial-systems-testing-contract.sh'
      - 'scripts/validate-financial-systems-testing-eval.py'
      - 'tests/financial-systems-testing-contract/**'
      - 'tests/financial-systems-testing-eval/cases.json'
      - 'tests/financial-systems-testing-eval/rubric.md'
      - 'tests/financial-systems-testing-eval/prompts/**'
      - 'tests/test_financial_systems_testing_contract.py'
      - 'tests/test_financial_systems_testing_eval.py'
      - 'tests/**'
      - 'tests/test_*.py'
  pull_request:
    paths:
      - 'skills/**/*.md'
      - 'docs/**/*.md'
      - '*.md'
      - 'skills/address-pr-comments-review/**'
      - 'docs/address-pr-comments-review/**'
      - 'scripts/check-address-pr-comments-review-contract.sh'
      - 'tests/address-pr-comments-review-contract/**'
      - 'skills/financial-systems-testing/**'
      - 'docs/financial-systems-testing/**'
      - 'scripts/check-financial-systems-testing-contract.sh'
      - 'scripts/validate-financial-systems-testing-eval.py'
      - 'tests/financial-systems-testing-contract/**'
      - 'tests/financial-systems-testing-eval/cases.json'
      - 'tests/financial-systems-testing-eval/rubric.md'
      - 'tests/financial-systems-testing-eval/prompts/**'
      - 'tests/test_financial_systems_testing_contract.py'
      - 'tests/test_financial_systems_testing_eval.py'
      - 'tests/**'
      - 'tests/test_*.py'

jobs:
  cross-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown cross-references
        run: bash scripts/check-cross-refs.sh

  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check external + internal links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --root-dir ${{ github.workspace }}
            --no-progress
            --exclude 'https://github.com/LYY/ai-toolkits'
            --exclude 'node_modules'
            --exclude '.git'
            '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  executor-neutral-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run contract checker
        run: bash scripts/check-address-pr-comments-review-contract.sh
      - name: Run contract fixture suite
        run: bash tests/address-pr-comments-review-contract/run.sh
      - name: Run contract unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -v tests/

  financial-systems-testing-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run financial contract checker
        run: bash scripts/check-financial-systems-testing-contract.sh
      - name: Run financial contract fixture suite
        run: bash tests/financial-systems-testing-contract/run.sh
      - name: Run financial contract unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest -v tests/test_financial_systems_testing_contract.py tests/test_financial_systems_testing_eval.py
